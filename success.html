<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmed — ChairUp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99, 60, 255, 0.15) 0%, transparent 70%);
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .checkmark {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.3);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c3bff, #9b59ff);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <a href="/" class="logo">✂️ ChairUp</a>

    <div class="card">
        <div class="checkmark">✓</div>
        <h1>You're all set!</h1>
        <p>
            Your booking is confirmed and payment was processed successfully.
            Check your email for the confirmation details and space address.
        </p>

        <div class="actions">
            <a href="/?view=dashboard" class="btn-primary" id="dashboard-btn">
                View my bookings →
            </a>
            <a href="/" class="btn-secondary">
                Explore more spaces
            </a>
        </div>
    </div>

    <script>
        // Redirect with auth state preserved
        document.getElementById('dashboard-btn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/#dashboard';
        });
    </script>
</body>

</html>
